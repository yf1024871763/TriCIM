{{include_text('defines.yaml')}}

architecture:
  # ======================= Top level is !Hierarchical =======================
  nodes:
  - !Container # Top-level system
    name: system
    <<<: [*container_defaults]
    attributes: {has_power_gating: True}
  - !Component # Dummy top-level buffer to hold input and output data
    name: dummy_top
    <<<: [*component_defaults]
    attributes: {depth: INF, width: 1}
    constraints:
      dataspace: {keep_only: [Inputs, Outputs,Weights]}
      temporal: 
        factors: [Q=-1, N=-1] # Weight-stationary
        #factors_only: [P=0]
        #maximize_dims: [[P]]
        #maximize_dims_capacity: 28
        
        #permutation: [X, Y, Z, P, Q, N, G, C, M, R, S] # Weight-stationary
        #permutation: []
        #permutation: [C,P,Q,M] # Output-stationary
        #permutation: [M,P,Q,C] #Input-stationary
        permutation: [C,M,Q,P] #HS
        #permutation: [Q,P,M,C] #OC-First
        #permutation: [Q,P,C,M] #IC-First
        #permutation: [C,M,Q,P] #H-Split
        #permutation: []


  - !Container # Have one macro in this system
    name: macro_in_system
    <<<: [*container_defaults]
    spatial: {meshX: 1}
    constraints: {spatial: {must_iterate_over_dataspaces: [Weights]}}
